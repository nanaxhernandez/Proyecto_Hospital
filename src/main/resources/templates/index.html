<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sistema hospitalario</title>
        <!-- Bootstrap -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
        <!-- CSS -->
        <link href="/css/style.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <div class="container text-center mt-5">
            <h1 class="text-primary mb-4">Bienvenidos al Sistema Web Hospitalario</h1>

            <!-- Contenedor vertical -->
            <div class="d-flex flex-column align-items-center gap-3">
                <a th:href="@{/usuario/listado}" class="btn btn-primary btn-lg w-50">Registrar Usuarios</a>
                <a th:href="@{/paciente/listado}" class="btn btn-success btn-lg w-50">Pacientes</a>
                <a th:href="@{/doctor/listado}" class="btn btn-info btn-lg w-50">Doctores</a>
                <a th:href="@{/cita/listado}" class="btn btn-warning btn-lg w-50">Citas</a>
                <a th:href="@{/historialmedico/listado}" class="btn btn-warning btn-lg w-50">HistorialMédico</a>
                <a th:href="@{/reportes/listado}" class="btn btn-warning btn-lg w-50">Reportes</a>
                <a th:href="@{/inventario/listado}" class="btn btn-warning btn-lg w-50">Inventario</a>
                <a th:href="@{/facturacion/listado}" class="btn btn-warning btn-lg w-50">Facturación</a>
                <a th:href="@{/usuario/buscar}" class="btn btn-primary">
                    Buscar Usuario
                </a>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
