<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="general/fragmentos :: head"></head>
    <body>
        <header th:replace="general/fragmentos :: header"></header>

        <div class="container mt-4">
            <h2>Listado de Usuarios</h2>
            <a th:href="@{/usuario/nuevo}" class="btn btn-primary mb-3">Nuevo Usuario</a>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Cédula</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="usuario : ${usuarios}">
                        <td th:text="${usuario.nombre}"></td>
                        <td th:text="${usuario.correo}"></td>
                        <td th:text="${usuario.rol}"></td>
                        <td th:text="${usuario.cedula}"></td>
                        <td>
                            <a th:href="@{/usuario/modificar/{id}(id=${usuario.idUsuario})}" class="btn btn-warning">Modificar</a>
                            <a th:href="@{/usuario/eliminar/{id}(id=${usuario.idUsuario})}" class="btn btn-danger">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <footer th:replace="general/fragmentos :: footer"></footer>
    </body>
</html>
